<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 120" preserveAspectRatio="none">
  <defs>
    <radialGradient id="nebula1" cx="20%" cy="50%" r="40%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#020205;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="nebula2" cx="80%" cy="50%" r="35%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#020205;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="nebula3" cx="50%" cy="30%" r="30%">
      <stop offset="0%" style="stop-color:#ec4899;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#020205;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="120" fill="#020205"/>
  <rect width="1200" height="120" fill="url(#nebula1)"/>
  <rect width="1200" height="120" fill="url(#nebula2)"/>
  <rect width="1200" height="120" fill="url(#nebula3)"/>
  
  <!-- Stars with twinkle animation -->
  <style>
    @keyframes twinkle { 0%,100%{opacity:0.3} 50%{opacity:1} }
    @keyframes twinkle2 { 0%,100%{opacity:0.5} 50%{opacity:0.1} }
    @keyframes drift { 0%{transform:translateX(0)} 100%{transform:translateX(-20px)} }
    .star { animation: twinkle 3s ease-in-out infinite; }
    .star2 { animation: twinkle2 4s ease-in-out infinite; }
    .star3 { animation: twinkle 5s ease-in-out infinite; }
  </style>
  
  <!-- Layer 1: Dim distant stars -->
  <circle class="star" cx="50" cy="20" r="0.8" fill="#c084fc" style="animation-delay:0s"/>
  <circle class="star2" cx="150" cy="80" r="0.5" fill="#fff" style="animation-delay:0.5s"/>
  <circle class="star3" cx="200" cy="40" r="0.7" fill="#22d3ee" style="animation-delay:1s"/>
  <circle class="star" cx="300" cy="15" r="0.6" fill="#fff" style="animation-delay:1.5s"/>
  <circle class="star2" cx="400" cy="90" r="0.8" fill="#c084fc" style="animation-delay:0.3s"/>
  <circle class="star3" cx="500" cy="30" r="0.5" fill="#fff" style="animation-delay:2s"/>
  <circle class="star" cx="600" cy="70" r="0.7" fill="#22d3ee" style="animation-delay:0.7s"/>
  <circle class="star2" cx="700" cy="25" r="0.6" fill="#f472b6" style="animation-delay:1.2s"/>
  <circle class="star3" cx="800" cy="100" r="0.8" fill="#fff" style="animation-delay:0.4s"/>
  <circle class="star" cx="900" cy="50" r="0.5" fill="#c084fc" style="animation-delay:1.8s"/>
  <circle class="star2" cx="1000" cy="35" r="0.7" fill="#fff" style="animation-delay:0.9s"/>
  <circle class="star3" cx="1100" cy="85" r="0.6" fill="#22d3ee" style="animation-delay:2.5s"/>
  
  <!-- Layer 2: Brighter stars -->
  <circle class="star" cx="100" cy="60" r="1.2" fill="#a855f7" style="animation-delay:0.2s"/>
  <circle class="star2" cx="250" cy="95" r="1" fill="#fff" style="animation-delay:1.3s"/>
  <circle class="star3" cx="350" cy="45" r="1.1" fill="#06b6d4" style="animation-delay:0.6s"/>
  <circle class="star" cx="450" cy="10" r="1" fill="#ec4899" style="animation-delay:2.2s"/>
  <circle class="star2" cx="550" cy="110" r="1.2" fill="#fff" style="animation-delay:0.8s"/>
  <circle class="star3" cx="650" cy="55" r="1" fill="#a855f7" style="animation-delay:1.6s"/>
  <circle class="star" cx="750" cy="75" r="1.1" fill="#06b6d4" style="animation-delay:0.1s"/>
  <circle class="star2" cx="850" cy="20" r="1" fill="#fff" style="animation-delay:2.8s"/>
  <circle class="star3" cx="950" cy="65" r="1.2" fill="#ec4899" style="animation-delay:1.1s"/>
  <circle class="star" cx="1050" cy="40" r="1" fill="#a855f7" style="animation-delay:0.5s"/>
  <circle class="star2" cx="1150" cy="105" r="1.1" fill="#fff" style="animation-delay:1.9s"/>
  
  <!-- Shooting star -->
  <line x1="0" y1="30" x2="80" y2="50" stroke="url(#nebula1)" stroke-width="1.5" opacity="0.6">
    <animate attributeName="x1" values="1200;0" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="x2" values="1280;80" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.8;0" dur="6s" repeatCount="indefinite"/>
  </line>
  <line x1="0" y1="80" x2="60" y2="95" stroke="url(#nebula2)" stroke-width="1" opacity="0.4">
    <animate attributeName="x1" values="1200;0" dur="9s" repeatCount="indefinite"/>
    <animate attributeName="x2" values="1260;60" dur="9s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.6;0" dur="9s" repeatCount="indefinite"/>
  </line>
</svg>
