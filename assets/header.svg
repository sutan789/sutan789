<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="400" viewBox="0 0 1200 400">
  <defs>
    <!-- Nebula gradients -->
    <radialGradient id="n1" cx="15%" cy="60%" r="45%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:0.35"/>
      <stop offset="100%" style="stop-color:#020205;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="n2" cx="85%" cy="40%" r="40%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#020205;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="n3" cx="50%" cy="80%" r="35%">
      <stop offset="0%" style="stop-color:#ec4899;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#020205;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="n4" cx="65%" cy="20%" r="25%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#020205;stop-opacity:0"/>
    </radialGradient>
    <!-- Star glow -->
    <radialGradient id="starglow">
      <stop offset="0%" style="stop-color:#fff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#fff;stop-opacity:0"/>
    </radialGradient>
    <!-- Text gradient -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c084fc"/>
      <stop offset="50%" style="stop-color:#22d3ee"/>
      <stop offset="100%" style="stop-color:#f472b6"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#a855f7;stop-opacity:0.8"/>
      <stop offset="50%" style="stop-color:#06b6d4;stop-opacity:1"/>
      <stop offset="70%" style="stop-color:#ec4899;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <style>
    @keyframes twinkle1 { 0%,100%{opacity:0.2;r:0.5} 50%{opacity:1;r:1.2} }
    @keyframes twinkle2 { 0%,100%{opacity:0.4;r:0.7} 50%{opacity:0.1;r:0.3} }
    @keyframes twinkle3 { 0%,100%{opacity:0.1;r:0.4} 50%{opacity:0.9;r:1} }
    @keyframes float1 { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
    @keyframes float2 { 0%,100%{transform:translateY(0)} 50%{transform:translateY(6px)} }
    @keyframes pulse { 0%,100%{opacity:0.6} 50%{opacity:1} }
    @keyframes shootR { 0%{transform:translateX(-100px);opacity:0} 10%{opacity:1} 90%{opacity:1} 100%{transform:translateX(1400px);opacity:0} }
    @keyframes shootL { 0%{transform:translateX(100px);opacity:0} 10%{opacity:0.8} 90%{opacity:0.8} 100%{transform:translateX(-1400px);opacity:0} }
    @keyframes nebulaPulse1 { 0%,100%{opacity:0.35} 50%{opacity:0.5} }
    @keyframes nebulaPulse2 { 0%,100%{opacity:0.3} 50%{opacity:0.45} }
    @keyframes titleGlow { 0%,100%{filter:drop-shadow(0 0 8px rgba(168,85,247,0.5))} 50%{filter:drop-shadow(0 0 20px rgba(168,85,247,0.9)) drop-shadow(0 0 40px rgba(6,182,212,0.4))} }
    @keyframes subtitleGlow { 0%,100%{filter:drop-shadow(0 0 4px rgba(6,182,212,0.3))} 50%{filter:drop-shadow(0 0 12px rgba(6,182,212,0.7))} }
    @keyframes lineShimmer { 0%{stroke-dashoffset:800} 100%{stroke-dashoffset:0} }
    
    .s1 { animation: twinkle1 3s ease-in-out infinite; }
    .s2 { animation: twinkle2 4s ease-in-out infinite; }
    .s3 { animation: twinkle3 5s ease-in-out infinite; }
    .neb1 { animation: nebulaPulse1 8s ease-in-out infinite; }
    .neb2 { animation: nebulaPulse2 10s ease-in-out infinite; }
    .shoot-r { animation: shootR 4s linear infinite; }
    .shoot-l { animation: shootL 6s linear infinite; }
    .title { animation: titleGlow 3s ease-in-out infinite; }
    .subtitle { animation: subtitleGlow 4s ease-in-out infinite; }
    .line-anim { animation: lineShimmer 4s linear infinite; }
  </style>

  <!-- Background -->
  <rect width="1200" height="400" fill="#020205"/>
  
  <!-- Nebula layers -->
  <rect class="neb1" width="1200" height="400" fill="url(#n1)"/>
  <rect class="neb2" width="1200" height="400" fill="url(#n2)"/>
  <rect width="1200" height="400" fill="url(#n3)"/>
  <rect width="1200" height="400" fill="url(#n4)"/>

  <!-- Distant star field (tiny dots) -->
  <circle cx="23" cy="45" r="0.4" fill="#8b8b9e"/>
  <circle cx="67" cy="120" r="0.3" fill="#8b8b9e"/>
  <circle cx="112" cy="78" r="0.5" fill="#8b8b9e"/>
  <circle cx="156" cy="200" r="0.3" fill="#8b8b9e"/>
  <circle cx="198" cy="340" r="0.4" fill="#8b8b9e"/>
  <circle cx="234" cy="156" r="0.3" fill="#8b8b9e"/>
  <circle cx="289" cy="290" r="0.5" fill="#8b8b9e"/>
  <circle cx="345" cy="67" r="0.3" fill="#8b8b9e"/>
  <circle cx="390" cy="310" r="0.4" fill="#8b8b9e"/>
  <circle cx="423" cy="180" r="0.3" fill="#8b8b9e"/>
  <circle cx="478" cy="95" r="0.4" fill="#8b8b9e"/>
  <circle cx="534" cy="250" r="0.3" fill="#8b8b9e"/>
  <circle cx="567" cy="370" r="0.5" fill="#8b8b9e"/>
  <circle cx="612" cy="45" r="0.3" fill="#8b8b9e"/>
  <circle cx="656" cy="220" r="0.4" fill="#8b8b9e"/>
  <circle cx="701" cy="130" r="0.3" fill="#8b8b9e"/>
  <circle cx="745" cy="350" r="0.5" fill="#8b8b9e"/>
  <circle cx="789" cy="80" r="0.3" fill="#8b8b9e"/>
  <circle cx="834" cy="270" r="0.4" fill="#8b8b9e"/>
  <circle cx="878" cy="160" r="0.3" fill="#8b8b9e"/>
  <circle cx="923" cy="310" r="0.5" fill="#8b8b9e"/>
  <circle cx="967" cy="50" r="0.3" fill="#8b8b9e"/>
  <circle cx="1012" cy="190" r="0.4" fill="#8b8b9e"/>
  <circle cx="1056" cy="340" r="0.3" fill="#8b8b9e"/>
  <circle cx="1089" cy="100" r="0.5" fill="#8b8b9e"/>
  <circle cx="1134" cy="250" r="0.3" fill="#8b8b9e"/>
  <circle cx="1178" cy="370" r="0.4" fill="#8b8b9e"/>

  <!-- Twinkling stars layer 1: Purple -->
  <circle class="s1" cx="80" cy="60" r="1" fill="#c084fc" style="animation-delay:0s"/>
  <circle class="s2" cx="240" cy="150" r="0.8" fill="#c084fc" style="animation-delay:1.2s"/>
  <circle class="s3" cx="420" cy="50" r="1.1" fill="#c084fc" style="animation-delay:0.5s"/>
  <circle class="s1" cx="680" cy="320" r="0.9" fill="#c084fc" style="animation-delay:2s"/>
  <circle class="s2" cx="900" cy="80" r="1" fill="#c084fc" style="animation-delay:0.8s"/>
  <circle class="s3" cx="1100" cy="200" r="0.8" fill="#c084fc" style="animation-delay:1.5s"/>

  <!-- Twinkling stars layer 2: Cyan -->
  <circle class="s2" cx="160" cy="300" r="0.9" fill="#22d3ee" style="animation-delay:0.3s"/>
  <circle class="s3" cx="350" cy="280" r="1" fill="#22d3ee" style="animation-delay:1.8s"/>
  <circle class="s1" cx="550" cy="350" r="0.8" fill="#22d3ee" style="animation-delay:0.7s"/>
  <circle class="s2" cx="780" cy="40" r="1.1" fill="#22d3ee" style="animation-delay:2.5s"/>
  <circle class="s3" cx="1020" cy="310" r="0.9" fill="#22d3ee" style="animation-delay:0.2s"/>

  <!-- Twinkling stars layer 3: White (brightest) -->
  <circle class="s1" cx="120" cy="180" r="1.3" fill="#ffffff" style="animation-delay:0.4s"/>
  <circle class="s3" cx="310" cy="100" r="1.1" fill="#ffffff" style="animation-delay:1s"/>
  <circle class="s2" cx="490" cy="250" r="1.4" fill="#ffffff" style="animation-delay:2.2s"/>
  <circle class="s1" cx="630" cy="120" r="1.2" fill="#ffffff" style="animation-delay:0.6s"/>
  <circle class="s3" cx="820" cy="180" r="1.3" fill="#ffffff" style="animation-delay:1.4s"/>
  <circle class="s2" cx="960" cy="150" r="1.1" fill="#ffffff" style="animation-delay:0.9s"/>
  <circle class="s1" cx="1140" cy="90" r="1.2" fill="#ffffff" style="animation-delay:1.7s"/>
  <circle class="s3" cx="1050" cy="50" r="1" fill="#ffffff" style="animation-delay:2.8s"/>

  <!-- Twinkling stars layer 4: Pink -->
  <circle class="s3" cx="200" cy="350" r="0.8" fill="#f472b6" style="animation-delay:1.3s"/>
  <circle class="s1" cx="450" cy="380" r="0.9" fill="#f472b6" style="animation-delay:0.1s"/>
  <circle class="s2" cx="720" cy="250" r="1" fill="#f472b6" style="animation-delay:2.1s"/>
  <circle class="s3" cx="1080" cy="350" r="0.8" fill="#f472b6" style="animation-delay:0.6s"/>

  <!-- Bright star clusters -->
  <circle cx="600" cy="100" r="2" fill="url(#starglow)" opacity="0.4">
    <animate attributeName="opacity" values="0.2;0.6;0.2" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="r" values="1.5;2.5;1.5" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="180" cy="230" r="1.8" fill="url(#starglow)" opacity="0.3">
    <animate attributeName="opacity" values="0.15;0.5;0.15" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="r" values="1.2;2.2;1.2" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1050" cy="130" r="2.2" fill="url(#starglow)" opacity="0.35">
    <animate attributeName="opacity" values="0.2;0.55;0.2" dur="3.5s" repeatCount="indefinite"/>
    <animate attributeName="r" values="1.5;2.8;1.5" dur="3.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Shooting stars -->
  <g class="shoot-r" style="animation-delay:0s">
    <line x1="0" y1="80" x2="60" y2="85" stroke="#a855f7" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
    <line x1="60" y1="85" x2="80" y2="86" stroke="#c084fc" stroke-width="0.5" stroke-linecap="round" opacity="0.3"/>
  </g>
  <g class="shoot-l" style="animation-delay:2s">
    <line x1="0" y1="280" x2="-50" y2="275" stroke="#06b6d4" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>
    <line x1="-50" y1="275" x2="-70" y2="274" stroke="#22d3ee" stroke-width="0.4" stroke-linecap="round" opacity="0.3"/>
  </g>
  <g class="shoot-r" style="animation-delay:5s">
    <line x1="0" y1="190" x2="45" y2="195" stroke="#ec4899" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
    <line x1="45" y1="195" x2="60" y2="196" stroke="#f472b6" stroke-width="0.4" stroke-linecap="round" opacity="0.2"/>
  </g>

  <!-- Main title -->
  <text class="title" x="600" y="155" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="48" font-weight="700" fill="url(#textGrad)" text-anchor="middle" letter-spacing="2">
    Sutan Irvan Aziz
  </text>
  
  <!-- Subtitle -->
  <text class="subtitle" x="600" y="200" font-family="'Fira Code', 'Courier New', monospace" font-size="18" fill="#06b6d4" text-anchor="middle" letter-spacing="3" opacity="0.9">
    ⟨ Full-Stack Developer ⟩
  </text>

  <!-- Decorative line under title -->
  <line x1="350" y1="225" x2="850" y2="225" stroke="url(#lineGrad)" stroke-width="1" class="line-anim" stroke-dasharray="800" opacity="0.6"/>

  <!-- Tech tags -->
  <text x="600" y="265" font-family="'Fira Code', 'Courier New', monospace" font-size="13" fill="#c084fc" text-anchor="middle" opacity="0.7" letter-spacing="1">
    Laravel • Next.js • Python • Django • Flutter • React
  </text>

  <!-- Location & role -->
  <text x="600" y="295" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle" letter-spacing="1">
    📍 Aceh, Indonesia  •  🔭 Building scalable web applications
  </text>
  
  <!-- Bottom gradient fade -->
  <rect y="360" width="1200" height="40" fill="url(#n3)" opacity="0.5"/>
  <line x1="0" y1="398" x2="1200" y2="398" stroke="url(#lineGrad)" stroke-width="1" opacity="0.4"/>
</svg>
