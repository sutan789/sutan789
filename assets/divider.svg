<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="30" viewBox="0 0 1200 30">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:0"/>
      <stop offset="25%" style="stop-color:#a855f7;stop-opacity:0.6"/>
      <stop offset="50%" style="stop-color:#06b6d4;stop-opacity:0.8"/>
      <stop offset="75%" style="stop-color:#ec4899;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <style>
    @keyframes t { 0%,100%{opacity:0.2} 50%{opacity:1} }
    .d { animation: t 3s ease-in-out infinite; }
  </style>
  <rect width="1200" height="30" fill="#020205"/>
  <!-- Scattered tiny stars -->
  <circle class="d" cx="50" cy="10" r="0.5" fill="#c084fc" style="animation-delay:0s"/>
  <circle class="d" cx="150" cy="20" r="0.4" fill="#fff" style="animation-delay:0.5s"/>
  <circle class="d" cx="280" cy="8" r="0.6" fill="#22d3ee" style="animation-delay:1s"/>
  <circle class="d" cx="400" cy="22" r="0.4" fill="#c084fc" style="animation-delay:1.5s"/>
  <circle class="d" cx="520" cy="12" r="0.5" fill="#fff" style="animation-delay:0.3s"/>
  <circle class="d" cx="650" cy="18" r="0.6" fill="#f472b6" style="animation-delay:2s"/>
  <circle class="d" cx="780" cy="7" r="0.4" fill="#22d3ee" style="animation-delay:0.8s"/>
  <circle class="d" cx="900" cy="24" r="0.5" fill="#c084fc" style="animation-delay:1.2s"/>
  <circle class="d" cx="1020" cy="14" r="0.4" fill="#fff" style="animation-delay:0.6s"/>
  <circle class="d" cx="1150" cy="20" r="0.5" fill="#f472b6" style="animation-delay:1.8s"/>
  <!-- Center gradient line -->
  <line x1="100" y1="15" x2="1100" y2="15" stroke="url(#g)" stroke-width="0.5" opacity="0.5"/>
</svg>
